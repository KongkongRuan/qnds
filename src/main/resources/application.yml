server:
  port: 18023

# Node settings
qdns:
  node:
    # Set the node IP explicitly when auto-detection is not desired.
    # In multi-NIC environments, keep this aligned with the Redis device-list key.
    address: 192.168.1.37

spring:
  application:
    name: qdns
  cloud:
    nacos:
      discovery:
        server-addr: ${qdns.nacos.server-addr}
        namespace: ${qdns.nacos.namespace}
        group: DEFAULT_GROUP
        enabled: ${qdns.nacos.enabled}
      config:
        server-addr: ${qdns.nacos.server-addr}
        namespace: ${qdns.nacos.namespace}
        file-extension: yml
        enabled: ${qdns.nacos.enabled}
  redis:
    host: ${qdns.redis.host}
    port: ${qdns.redis.port}
    password: ${qdns.redis.password}
    database: 8
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# SNMP collection settings
snmp:
  default-protocol: SNMPv3
  sm:
    legacy-mode: true
  v3:
    username: ${qdns.snmp.v3-username}
    auth-password: ${qdns.snmp.v3-auth-password}
    priv-password: ${qdns.snmp.v3-priv-password}
    auth-protocol: SHA
    priv-protocol: AES128
  v2c:
    community-read: ${qdns.snmp.v2-community-read}
    community-write: ${qdns.snmp.v2-community-write}
  timeout: 3000
  retries: 2
  max-repetitions: 20
  trap:
    enabled: ${qdns.snmp.trap.enabled:true}
    listen-port: ${qdns.snmp.trap.listen-port:1162}
    auto-set-target: ${qdns.snmp.trap.auto-set-target:true}
    target-port: ${qdns.snmp.trap.target-port:1162}

# Alarm settings
alarm:
  enabled: ${qdns.alarm.enabled:true}
  platform-url: ${qdns.alarm.platform-url:}
  retry-count: ${qdns.alarm.retry-count:3}
  retry-interval-ms: ${qdns.alarm.retry-interval-ms:1000}

# Collector scheduling
collector:
  scan-interval: ${qdns.collector.scan-interval}
  initial-delay: 10
  thread-pool-size: 10
  batch-size: 50
  # When true, scan-interval runs only the frequent metrics and full-scan-cron runs full collection.
  split-schedule-enabled: ${qdns.collector.split-schedule-enabled:true}
  # Full collection cron. Default is every day at 02:00.
  full-scan-cron: ${qdns.collector.full-scan-cron:0 0 2 * * ?}

# Redis key settings
# The platform device-list key format is ip:port. Empty prefix means using the raw key directly.
redis-key:
  device-list-prefix: ""
  device-status-prefix: "qdns:status:"
  device-status-ttl: 300
  trap-configured-prefix: "qdns:trap-configured:"

# OID settings
oid:
  enterprise-prefix: "1.3.6.1.4.1.99999"

# Logging
logging:
  level:
    com.qasky.qdns: DEBUG
    org.snmp4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

vpn-sim:
  api:
    port: ${qdns.vpn-sim.api.port:8888}
    timeout:
      connect: ${qdns.vpn-sim.api.timeout.connect:5000}
      read: ${qdns.vpn-sim.api.timeout.read:30000}
    poll:
      interval-ms: ${qdns.vpn-sim.api.poll.interval-ms:1000}
      timeout-ms: ${qdns.vpn-sim.api.poll.timeout-ms:180000}
  ssl-vpn:
    api-port: ${qdns.vpn-sim.ssl-vpn.api-port:8443}
    timeout:
      connect: ${qdns.vpn-sim.ssl-vpn.timeout.connect:5000}
      read: ${qdns.vpn-sim.ssl-vpn.timeout.read:30000}
    addressing-mode: ${qdns.vpn-sim.ssl-vpn.addressing-mode:ip}

unified:
  async:
    thread-pool-size: ${qdns.unified.async.thread-pool-size:4}
  task:
    redis-prefix: ${qdns.unified.task.redis-prefix:qdns:unified:task:}
    ttl-seconds: ${qdns.unified.task.ttl-seconds:86400}
  ssh:
    timeout:
      connect: ${qdns.unified.ssh.timeout.connect:10000}
      execute: ${qdns.unified.ssh.timeout.execute:30000}
    output-log-max-length: ${qdns.unified.ssh.output-log-max-length:2048}
    default-username: ${qdns.unified.ssh.default-username:}
    default-password: ${qdns.unified.ssh.default-password:}

certificate:
  ca-service:
    base-url: ${qdns.certificate.ca-service.base-url:http://192.168.1.106:18892/ca}
    timeout:
      connect: ${qdns.certificate.ca-service.timeout.connect:5000}
      read: ${qdns.certificate.ca-service.timeout.read:15000}
    default-valid-days: ${qdns.certificate.ca-service.default-valid-days:365}
